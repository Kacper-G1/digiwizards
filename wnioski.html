<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wnioski z ankiety - Świadomość i Obrona</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-muted: #475569;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: white;
            padding: 20px 0;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-back:hover {
            color: var(--primary);
        }

        main {
            flex: 1;
            padding: 100px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .content-card {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 60px 40px;
            margin-top: 40px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 20px;
            color: var(--text);
        }

        p {
            font-size: 1.125rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .icon-large {
            width: 80px;
            height: 80px;
            color: var(--primary);
            margin-bottom: 30px;
            opacity: 0.8;
        }
        
        @media (max-width: 768px) {
            main {
                padding: 60px 20px;
            }
            .content-card {
                padding: 40px 20px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <i data-lucide="shield"></i>
                Świadomość i Obrona
            </a>
            <a href="index.html" class="btn-back">
                <i data-lucide="arrow-left" style="width: 20px; height: 20px;"></i>
                Wróć do strony głównej
            </a>
        </div>
    </header>

    <main>
        <div class="content-card">
            <i data-lucide="bar-chart-3" class="icon-large"></i>
            <h1>Wnioski z ankiety</h1>
            <p>Ta strona służy jako szablon. Wkrótce pojawią się tutaj szczegółowe wyniki i wnioski z przeprowadzonej ankiety na temat znajomości technik manipulacji.</p>
        </div>
    </main>

    <footer style="padding: 40px 0; text-align: center; color: var(--text-muted); font-size: 0.875rem; background: white; margin-top: auto;">
        <p>&copy; 2026 Świadomość i Obrona. Edukacyjny projekt o manipulacji cyfrowej.</p>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
